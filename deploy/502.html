<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="3">
    <title>Terraforming Mars - Updating</title>
    <style>
        body {
            background: rgb(48, 48, 48);
            color: #ddd;
            font-family: Ubuntu, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        h1 {
            color: #ffcc64;
            font-size: 28px;
            text-shadow: -1px -1px 6px rgba(255, 204, 100, 0.3);
        }
        p {
            font-size: 16px;
            color: #aaa;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #555;
            border-top: 4px solid #ffcc64;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Server is updating</h1>
        <div class="spinner"></div>
        <p>This page will refresh automatically...</p>
    </div>
</body>
</html>
