services:
  app:
    container_name: terraforming-mars
    build: ../
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - SERVER_ID=${SERVER_ID}
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - backend

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./502.html:/srv/502.html:ro
      - ../assets/stars.jpg:/srv/stars.jpg:ro
      - caddy_data:/data
      - caddy_config:/config
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend

  updater:
    build: ./updater
    restart: unless-stopped
    user: "${HOST_UID}:${HOST_GID}"
    group_add:
      - "${DOCKER_GID}"
    environment:
      - GIT_BRANCH=${GIT_BRANCH:-automa}
      - HOST_UID=${HOST_UID}
      - HOST_GID=${HOST_GID}
      - DOCKER_GID=${DOCKER_GID}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../:/repo
    security_opt:
      - no-new-privileges:true

networks:
  frontend:
  backend:

volumes:
  pgdata:
  caddy_data:
  caddy_config:
